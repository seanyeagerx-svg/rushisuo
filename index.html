<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>如实所现</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0c;
    --text: #d4cfc4;
    --text-dim: rgba(212, 207, 196, 0.45);
    --gold: #c9a96e;
    --card-bg: #141410;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif SC', 'Source Han Serif SC', 'STSong', serif;
    line-height: 1.8;
    overflow-x: hidden;
  }

  /* ===== HERO — 保留原开场 ===== */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
  }

  .hero-bg {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center 45%, rgba(15, 12, 8, 0) 30%, #060608 100%);
    animation: bgLight 2.4s cubic-bezier(0.22, 0.61, 0.36, 1) 0s forwards;
    z-index: 0;
  }

  .hero-ambient {
    position: fixed;
    bottom: -15vh;
    left: 50%;
    transform: translateX(-50%);
    width: 55vw;
    height: 35vh;
    background: radial-gradient(ellipse at center, rgba(201, 169, 110, 0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    opacity: 0;
    animation: breathe 8s ease-in-out 3s infinite, fadeInSlow 2s ease-out 3s forwards;
  }

  .hero-content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }

  .hero-line-1 {
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    letter-spacing: 0.06em;
    opacity: 0;
    animation: appear 1.2s cubic-bezier(0.22, 0.61, 0.36, 1) 0.5s forwards;
  }

  .hero-line-2 {
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 300;
    letter-spacing: 0.12em;
    margin-top: 0.3rem;
    opacity: 0;
    animation: appear 1.4s cubic-bezier(0.22, 0.61, 0.36, 1) 1.8s forwards;
  }

  .hero-line-3 {
    margin-top: 0.5rem;
    opacity: 0;
    font-size: clamp(1.3rem, 3vw, 1.8rem);
    animation: appear 1.4s cubic-bezier(0.22, 0.61, 0.36, 1) 3s forwards;
  }

  .hero-highlight {
    color: var(--gold);
    font-weight: 500;
  }

  .hero-title-reveal {
    margin-top: 2rem;
    font-size: 1rem;
    letter-spacing: 0.5em;
    color: rgba(212, 207, 196, 0.55);
    opacity: 0;
    animation: appear 1.2s cubic-bezier(0.22, 0.61, 0.36, 1) 3.8s forwards;
  }

  .hero-title-reveal::before {
    content: '';
    display: block;
    width: 30px;
    height: 1px;
    background: rgba(201, 169, 110, 0.4);
    margin: 0 auto 1rem auto;
  }

  .hero-mark {
    font-size: 0.75rem;
    letter-spacing: 0.45em;
    color: rgba(212, 207, 196, 0.28);
    opacity: 0;
    margin-top: 0.3rem;
    animation: appear 1s cubic-bezier(0.22, 0.61, 0.36, 1) 4.2s forwards;
  }

  .hero-scroll {
    position: absolute;
    bottom: 2.5rem;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: rgba(212, 207, 196, 0.2);
    opacity: 0;
    animation: appear 2s ease-out 5.5s forwards;
  }

  /* ===== 3D 书本入口 ===== */
  .book-entry {
    position: relative;
    z-index: 2;
    margin-top: 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
    opacity: 0;
    animation: appear 1.4s cubic-bezier(0.22, 0.61, 0.36, 1) 6s forwards;
    cursor: pointer;
  }

  .book-hint {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: rgba(201, 169, 110, 0.4);
  }

  /* 3D 书本封面 */
  .book-cover {
    width: 80px;
    height: 110px;
    perspective: 800px;
    position: relative;
  }

  .book-3d {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transform: rotateY(-15deg);
    transition: transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
  }

  .book-entry:hover .book-3d {
    transform: rotateY(-5deg);
  }

  .book-3d .front {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #1a1812 0%, #0d0c09 100%);
    border: 1px solid rgba(201, 169, 110, 0.2);
    border-radius: 3px 8px 8px 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    writing-mode: vertical-rl;
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    color: var(--gold);
    box-shadow: 2px 4px 16px rgba(0,0,0,0.5);
  }

  .book-3d .spine {
    position: absolute;
    top: 0;
    left: 0;
    width: 6px;
    height: 100%;
    background: rgba(201, 169, 110, 0.35);
    border-radius: 3px 0 0 3px;
    transform-origin: left center;
  }

  .book-3d .pages {
    position: absolute;
    top: 2px;
    right: 2px;
    bottom: 2px;
    width: 3px;
    background: repeating-linear-gradient(
      to bottom,
      rgba(212, 207, 196, 0.15) 0px,
      rgba(212, 207, 196, 0.15) 1px,
      transparent 1px,
      transparent 2px
    );
    border-radius: 0 5px 5px 0;
  }

  /* ===== 书本全屏打开 ===== */
  .book-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(5, 5, 7, 0.97);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    visibility: hidden;
    opacity: 0;
    transition: opacity 0.5s ease, visibility 0s 0.5s;
    overflow-y: auto;
    padding: 3rem 2rem;
  }

  .book-overlay.open {
    visibility: visible;
    opacity: 1;
    transition: opacity 0.5s ease, visibility 0s 0s;
  }

  .book-close {
    position: fixed;
    top: 1.5rem;
    right: 1.5rem;
    z-index: 110;
    width: 40px;
    height: 40px;
    border: 1px solid rgba(201, 169, 110, 0.25);
    background: transparent;
    color: var(--gold);
    font-size: 1.2rem;
    cursor: pointer;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    visibility: hidden;
    opacity: 0;
    transition: all 0.3s ease, visibility 0s 0.3s;
  }

  .book-close.visible {
    visibility: visible;
    opacity: 1;
    transition: all 0.3s ease, visibility 0s 0s;
  }

  .book-close:hover {
    background: rgba(201, 169, 110, 0.1);
    border-color: rgba(201, 169, 110, 0.4);
  }

  .book-spread {
    max-width: 800px;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 3rem;
    padding-top: 2rem;
    padding-bottom: 4rem;
  }

  .book-header {
    text-align: center;
    padding-bottom: 2rem;
    border-bottom: 1px solid rgba(201, 169, 110, 0.15);
  }

  .book-header-title {
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    letter-spacing: 0.3em;
    color: var(--gold);
  }

  .book-header-sub {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    margin-top: 0.5rem;
  }

  .book-paragraph {
    display: flex;
    gap: 1.5rem;
    padding: 1.5rem 0;
    border-bottom: 1px solid rgba(201, 169, 110, 0.06);
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.6s cubic-bezier(0.22, 0.61, 0.36, 1);
  }

  .book-paragraph.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .book-paragraph .num {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.75rem;
    color: var(--gold);
    min-width: 2rem;
    padding-top: 0.15rem;
    opacity: 0.6;
  }

  .book-paragraph .text {
    flex: 1;
    font-size: 0.95rem;
    line-height: 2.1;
    letter-spacing: 0.04em;
  }

  .book-paragraph .text .g {
    color: var(--gold);
    font-weight: 500;
  }

  .book-paragraph .src {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    margin-top: 0.5rem;
  }

  @keyframes appear {
    from { opacity: 0; transform: translateY(12px); filter: blur(4px); }
    to   { opacity: 1; transform: translateY(0); filter: blur(0); }
  }

  @keyframes bgLight {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
    50%      { opacity: 1; transform: translateX(-50%) scale(1.08); }
  }

  @keyframes fadeInSlow {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
<body>

<div class="hero-bg"></div>
<div class="hero-ambient"></div>

<!-- HERO — 原开场 -->
<section class="hero">
  <div class="hero-content">
    <div class="hero-line-1">世界比你以为的简单。</div>
    <div class="hero-line-2">复杂的，</div>
    <div class="hero-line-3">是你脑子里那些<span class="hero-highlight">被过度演绎</span>的东西。</div>
    <div class="hero-title-reveal">如实所现</div>
    <div class="hero-mark">— 前言 —</div>

    <!-- 3D 书本入口 -->
    <div class="book-entry" id="bookEntry">
      <div class="book-cover">
        <div class="book-3d">
          <div class="spine"></div>
          <div class="front">如实所现</div>
          <div class="pages"></div>
        </div>
      </div>
      <span class="book-hint">翻开阅读</span>
    </div>
  </div>
  <div class="hero-scroll">↓ 下滑继续</div>
</section>

<!-- 全屏书 -->
<div class="book-overlay" id="bookOverlay">
  <div class="book-spread" id="bookSpread"></div>
</div>

<button class="book-close" id="bookClose">✕</button>

<script>
(function() {
  var passages = [
    { text: '在念头出现的瞬间，识别这是一个念头而不是事实，那个念头就失去了力量。它变成了一团<span class="g">飘过的云</span>，你不需要爬上去，也不需要追着它跑。', src: '第一章 — 你脑子里那个声音不是你' },
    { text: '你的大脑非常听话，听话到危险的程度。问题在于，<span class="g">你听话的对象错了。</span>', src: '第一章' },
    { text: '叙事让你瘫痪在巨大的"应该"和"不能"之间。结构让你回到<span class="g">具体的下一步。</span>', src: '第二章 — 叙事是这个时代最大的精神鸦片' },
    { text: '你的大脑每天承受的刺激，远远超过它在进化过程中被设计来承受的水平。你的情绪和真实生活之间的联系<span class="g">断了。</span>', src: '第三章 — 那些悄悄塑造你的力量' },
    { text: '注意力是你这一生最重要的资源。学会掌控它，你就掌控了你的情绪、你的产出、你的方向、<span class="g">你的人生。</span>', src: '第四章 — 注意力是你唯一真正的货币' },
    { text: '人通过反复说同一种话，<span class="g">活成了那种话所描述的样子。</span>', src: '第五章 — 语言是你最重要的技术' },
    { text: '当你把所有问题拆解到最小单元，<span class="g">每一个最小单元都不难。</span>困难从来不在最小单元里，困难在无力感里。', src: '第六章 — 结构化这个世界' },
    { text: '意志力的上限很大程度上取决于你的生理状态。天花板不在你的心理，<span class="g">在你的身体。</span>', src: '第七章 — 你的身体是你的核心生产力' },
    { text: '一个完成了的60分，永远比一个永远停留在想法阶段的<span class="g">100分更有价值。</span>', src: '第八章 — 做事的逻辑' },
    { text: '表达的意义，是把你的认知资产变成<span class="g">一艘船</span>——帮助别人更快地到达你已经到过的地方。', src: '第九章 — 表达是你影响世界的唯一接口' },
    { text: '世界很简单。复杂的是你脑子里那些被过度演绎的声音。但现在你知道了——<span class="g">那些声音不是你。你比它们大得多。</span>', src: '后记' }
  ];

  var overlay = document.getElementById('bookOverlay');
  var closeBtn = document.getElementById('bookClose');
  var spread = document.getElementById('bookSpread');
  var body = document.body;

  function buildSpread() {
    var h = '<div class="book-header"><div class="book-header-title">如实所现</div><div class="book-header-sub">精选段落</div></div>';
    passages.forEach(function(p, i) {
      h += '<div class="book-paragraph" data-idx="' + i + '">' +
        '<div class="num">' + String(i + 1).padStart(2, '0') + '</div>' +
        '<div><div class="text">' + p.text + '</div><div class="src">' + p.src + '</div></div>' +
        '</div>';
    });
    spread.innerHTML = h;
  }

  buildSpread();

  function openBook() {
    overlay.classList.add('open');
    closeBtn.classList.add('visible');
    body.style.overflow = 'hidden';
    // Trigger paragraph animations with delay
    setTimeout(function() {
      var paras = overlay.querySelectorAll('.book-paragraph');
      paras.forEach(function(p, i) {
        setTimeout(function() { p.classList.add('visible'); }, i * 80);
      });
    }, 300);
  }

  function closeBook() {
    overlay.classList.remove('open');
    closeBtn.classList.remove('visible');
    body.style.overflow = '';
    var paras = overlay.querySelectorAll('.book-paragraph');
    paras.forEach(function(p) { p.classList.remove('visible'); });
  }

  document.getElementById('bookEntry').addEventListener('click', openBook);
  closeBtn.addEventListener('click', closeBook);

  // ESC 关闭
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && overlay.classList.contains('open')) closeBook();
  });
})();
</script>

</body>
</html>
